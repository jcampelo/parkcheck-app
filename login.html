<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ParkCheck · Entrar</title>
<style>
  :root {
    --bg:      oklch(99% 0.002 240);
    --surface: oklch(100% 0 0);
    --fg:      oklch(18% 0.012 250);
    --muted:   oklch(54% 0.012 250);
    --border:  oklch(92% 0.005 250);
    --accent:  oklch(58% 0.18 255);
    --success: oklch(62% 0.16 150);
    --success-bg: oklch(62% 0.16 150 / 0.10);
    --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    --font-body:    -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-full: 9999px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: oklch(96% 0.004 250);
    color: var(--fg);
    display: flex; justify-content: center; align-items: center;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    width: 100%; max-width: 430px;
    height: 100dvh; max-height: 932px;
    background: var(--bg);
    display: flex; flex-direction: column; overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 1px var(--border), 0 25px 50px -12px rgba(0,0,0,0.12);
  }
  @media (min-width: 500px) { #app { border-radius: 32px; height: min(100dvh - 40px, 900px); } }

  .app-header {
    padding: 18px 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; background: var(--bg);
  }
  .app-logo {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 600; letter-spacing: -0.02em;
  }
  .app-logo span { color: var(--accent); }

  .role-badge {
    font-size: 11px; font-weight: 500; color: var(--muted);
    background: var(--border); padding: 6px 14px; border-radius: var(--radius-full);
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  .main-content {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column;
    -webkit-overflow-scrolling: touch;
  }

  .hero { text-align: center; margin-bottom: 28px; margin-top: 4px; }
  .hero h1 {
    font-family: var(--font-display);
    font-size: 26px; font-weight: 600; letter-spacing: -0.02em;
    line-height: 1.15; margin-bottom: 6px;
  }
  .hero > p { color: var(--muted); font-size: 15px; line-height: 1.35; }

  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 500; color: var(--muted);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em;
  }

  .form-input {
    width: 100%; padding: 15px 16px;
    font-size: 17px; font-family: var(--font-body);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--fg);
    outline: none; transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px oklch(58% 0.18 255 / 0.14);
  }
  .form-input::placeholder { color: oklch(80% 0.012 250); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 16px 28px; font-size: 16px; font-weight: 500;
    font-family: var(--font-body); border-radius: var(--radius-full);
    border: none; cursor: pointer; transition: all 0.15s ease;
    line-height: 1;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--accent); color: #fff; width: 100%; font-size: 17px;
  }
  .btn-primary:disabled { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="app-logo">Park<span>Check</span></div>
    <div class="role-badge">Gerente</div>
  </header>
  <div class="main-content">
    <div class="hero" style="margin-top:32px">
      <h1>Entrar</h1>
      <p>Acesso restrito ao gerente do estacionamento.</p>
    </div>
    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input class="form-input" type="email" id="email" placeholder="gerente@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" required>
      </div>
      <p id="loginError" style="color:oklch(55% 0.18 25);font-size:14px;text-align:center;margin-bottom:12px;display:none"></p>
      <button type="submit" class="btn btn-primary" id="loginBtn">Entrar</button>
    </form>
  </div>
</div>
<script type="module">
import { signIn, getSession } from './src/auth.js'

getSession().then(s => { if (s) window.location.href = '/gerente.html' })

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const btn = document.getElementById('loginBtn')
  const err = document.getElementById('loginError')
  btn.disabled = true
  btn.textContent = 'Entrando…'
  err.style.display = 'none'
  try {
    await signIn(email, password)
    window.location.href = '/gerente.html'
  } catch {
    err.textContent = 'E-mail ou senha incorretos.'
    err.style.display = 'block'
    btn.disabled = false
    btn.textContent = 'Entrar'
  }
})
</script>
</body>
</html>
